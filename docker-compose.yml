version: '3.8'
services:
  db:
    image: postgres:15
    container_name: pot_postgres
    restart: always
    environment:
      POSTGRES_DB: sistema_pedagogico_pot
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: pot_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@pot.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      - db

volumes:
  postgres_data:
