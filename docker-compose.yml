services:
  db:
    image: postgres:15
    container_name: pot_postgres
    restart: always
    environment:
      POSTGRES_DB: sistema_pedagogico_pot
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d sistema_pedagogico_pot"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    container_name: pot_backend
    restart: always
    environment:
      DATABASE_URL: postgresql://postgres:postgres123@db:5432/sistema_pedagogico_pot
      JWT_SECRET: pot_sistema_pedagogico_jwt_secret_super_seguro_2024
      JWT_EXPIRES_IN: 7d
      PORT: 3001
      NODE_ENV: production
      FRONTEND_URLS: "*"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    container_name: pot_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

  pgadmin:
    image: dpage/pgadmin4
    container_name: pot_pgadmin
    restart: always
    profiles: ["admin"]
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@pot.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "127.0.0.1:5050:80"
    depends_on:
      - db

volumes:
  postgres_data:
